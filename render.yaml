services:
  - type: web
    name: creditwiz
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: creditwiz-db
          property: connectionString

databases:
  - name: creditwiz-db
    plan: free
